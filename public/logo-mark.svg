<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Agent Fund logo mark">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02120d" />
      <stop offset="100%" stop-color="#06261a" />
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b0ffd8" />
      <stop offset="100%" stop-color="#1dff95" />
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="110" fill="url(#bg)" />

  <g stroke="url(#neon)" fill="none" stroke-linecap="round" filter="url(#glow)">
    <circle cx="256" cy="256" r="156" stroke-width="10" opacity="0.9" />
    <circle cx="256" cy="256" r="92" stroke-width="7" opacity="0.8" />
  </g>

  <g fill="#9effd2" filter="url(#glow)">
    <circle cx="256" cy="92" r="15" />
    <circle cx="111" cy="340" r="15" />
    <circle cx="401" cy="340" r="15" />
  </g>

  <g stroke="#7effc4" stroke-width="7" stroke-linecap="round" opacity="0.9">
    <path d="M256 110v43" />
    <path d="M126 331l35-20" />
    <path d="M386 331l-35-20" />
  </g>

  <g>
    <circle cx="256" cy="256" r="56" fill="#0a3324" stroke="#57ffac" stroke-width="5" />
    <path d="M222 267h68" stroke="#baffdf" stroke-width="10" stroke-linecap="round" />
    <path d="M268 236l30 31-30 31" fill="none" stroke="#baffdf" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
